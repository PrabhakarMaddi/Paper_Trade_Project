version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: paper-bull-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: paper-bull-server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/paperbull
      - JWT_SECRET=paperbull_secret_key_123
      - ALPHA_VANTAGE_API_KEY=your_key_here
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - paper-bull-network

  client:
    build: ./client
    container_name: paper-bull-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - paper-bull-network

networks:
  paper-bull-network:
    driver: bridge

volumes:
  mongo-data:
